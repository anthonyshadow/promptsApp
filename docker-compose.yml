services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptopts
      POSTGRES_PASSWORD: promptopts
      POSTGRES_DB: promptopts
    ports:
      - "5432:5432"
    volumes:
      - promptopts-postgres-data:/var/lib/postgresql/data
      - ./packages/shared/src/repositories/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptopts -d promptopts"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - promptopts-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  object-storage:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: promptopts
      MINIO_ROOT_PASSWORD: promptopts-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - promptopts-object-storage-data:/data

volumes:
  promptopts-postgres-data:
  promptopts-redis-data:
  promptopts-object-storage-data:
